name = "vtt-core"
main = "src/index.ts"
compatibility_date = "2025-04-01"

# Workers Builds restores dependency caches without gitignored dist/ output.
# Alias to source so wrangler bundles @vtt-core/shared directly; [build] still
# compiles shared first so typecheck runs before deploy.
[alias]
"@vtt-core/shared" = "../shared/src/index.ts"
# Resolve via node_modules so private git/file installs work (workspace symlink today).
"@vtt-core/hellpiercers-content/register" = "../../node_modules/@vtt-core/hellpiercers-content/src/register.ts"

[build]
# Resolve monorepo root via git so this works for both:
#   cd packages/cf-worker && wrangler deploy
#   wrangler deploy -c packages/cf-worker/wrangler.toml   (Workers Builds)
# (wrangler resolves [build].cwd from process cwd, not the config file path.)
command = "bash -c 'cd \"$(git rev-parse --show-toplevel)\" && exec bash scripts/cf-wrangler-build.sh'"
# watch_dir is relative to this config file. Client is served by Vite HMR in
# dev:cf, so we only watch worker + aliased shared/content source.
watch_dir = ["src", "../shared/src", "../../node_modules/@vtt-core/hellpiercers-content/src"]

[assets]
directory = "../client/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

[[kv_namespaces]]
binding = "PLAYER_KV"
id = "880eeee77c4b4f7ab78cf0861e4f40e5"
preview_id = "b45b7ded8e1b417e8aaf6b65d69e9c2e"

[[kv_namespaces]]
binding = "MAP_KV"
id = "bc5c9c49543d4e3884364184422b5a5c"
preview_id = "1261597feb9c46bdb1c56c46fb6420a2"

[[r2_buckets]]
binding = "PORTRAIT_R2"
bucket_name = "vtt-core-portraits"
preview_bucket_name = "vtt-core-portraits-preview"

# Room-state cutover from worker `gaem` (see docs/adr/008-package-rename.md).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

[[migrations]]
tag = "v2"
  [[migrations.renamed_classes]]
  from = "GameRoom"
  to = "GameRoomEmptyDiscard"

[[migrations]]
tag = "v3"
  [[migrations.transferred_classes]]
  from = "GameRoom"
  from_script = "gaem"
  to = "GameRoom"

[[migrations]]
tag = "v4"
deleted_classes = ["GameRoomEmptyDiscard"]
